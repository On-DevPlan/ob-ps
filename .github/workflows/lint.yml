name: Node.js build

# 触发条件:任意分支的 push 与 PR
on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                # 矩阵测试多个 Node 版本;支持周期见 https://nodejs.org/en/about/releases/
                node-version: [20.x, 22.x, 24.x]

        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'        # 缓存 npm,加速安装
            - run: npm ci             # 严格按 lockfile 安装
            - run: npm run build --if-present  # 有 build 脚本则执行(类型检查 + 打包)
            - run: npm run lint       # 静态检查
